<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#f7fafc">
    <title>abc — Modrinth Project</title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <main class="container">
      <header class="site-header">
        <div class="brand">
          <img id="icon" alt="project icon" />
          <div>
            <h1 id="project-title">abc</h1>
            <p id="project-short">A Modrinth project showcase</p>
          </div>
        </div>
      </header>

      <section class="content">
        <p id="project-desc">Loading project information…</p>

        <div id="versions" class="versions"></div>

        <div class="actions">
          <a id="download-btn" class="btn primary" target="_blank" rel="noopener">Open on Modrinth</a>
          <input id="slug-input" class="slug" placeholder="Project slug (default: abc)" />
          <button id="load-btn" class="btn">Load</button>
        </div>
      </section>

      <footer class="site-footer">
        <small>Powered by Modrinth API — <a id="project-link" href="#" target="_blank" rel="noopener">Open project</a></small>
      </footer>
    </main>

    <script src="js/app.js"></script>
  </body>
</html>
